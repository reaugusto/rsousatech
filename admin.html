<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rsousa Tech - Nexus Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        body { background-color: #03060C; color: #E2E8F0; }
        .cyber-panel { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(0, 240, 255, 0.1); }
        .input-cyber { background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(0, 240, 255, 0.2); color: white; transition: all 0.3s; }
        .input-cyber:focus { outline: none; border-color: #00F0FF; box-shadow: 0 0 10px rgba(0, 240, 255, 0.2); }
        
        #login-overlay {
            position: fixed;
            inset: 0;
            background: #03060C;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }
        
        /* Garantir que o gradiente do login seja resiliente */
        .login-gradient-text {
            background: linear-gradient(90deg, #00F0FF, #7000FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden">
    <!-- Login Overlay -->
    <div id="login-overlay">
        <div class="w-full max-w-md p-8 cyber-panel rounded-xl shadow-[0_0_50px_rgba(0,240,255,0.1)]">
            <div class="text-center mb-10">
                <h1 class="text-3xl font-bold uppercase tracking-widest login-gradient-text mb-2">Acesso Restrito</h1>
                <p class="text-slate-500 text-[10px] uppercase tracking-widest font-label">Portal Admin // Nexus Auth Required</p>
            </div>
            <form id="login-form" class="space-y-6">
                <div>
                    <label class="block text-[10px] uppercase tracking-widest text-cyan-500 mb-2 font-label">Identidade (E-mail)</label>
                    <input type="email" id="login-email" required class="w-full input-cyber p-4 rounded text-sm" placeholder="admin@rsousa.tech">
                </div>
                <div>
                    <label class="block text-[10px] uppercase tracking-widest text-cyan-500 mb-2 font-label">Chave de Acesso (Senha)</label>
                    <input type="password" id="login-password" required class="w-full input-cyber p-4 rounded text-sm" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full bg-cyan-500 text-black font-bold py-4 rounded hover:shadow-[0_0_20px_rgba(0,240,255,0.4)] transition-all uppercase tracking-widest text-xs">
                    Autenticar no Nexus
                </button>
                <p id="login-error" class="text-red-500 text-[10px] text-center hidden uppercase font-bold mt-4 tracking-wider"></p>
            </form>
        </div>
    </div>

    <!-- Sidebar / Lista de Projetos -->
    <div class="w-80 cyber-panel h-full flex flex-col relative z-10 shadow-[5px_0_20px_rgba(0,0,0,0.5)]">
        <div class="p-6 border-b border-cyan-500/20 flex justify-between items-center">
            <div>
                <h1 class="font-bold text-xl cyber-gradient-text uppercase tracking-widest">NEXUS ADMIN</h1>
                <p class="text-[10px] text-slate-400 mt-1 uppercase tracking-widest">Gerenciamento de DB</p>
            </div>
            <button onclick="handleLogout()" class="text-slate-500 hover:text-red-400 transition-colors p-2" title="Desconectar">
                <span class="material-symbols-outlined">logout</span>
            </button>
        </div>
        <div class="p-4">
            <button onclick="createNew()" class="w-full bg-cyan-900/30 text-cyan-400 border border-cyan-500/30 py-3 flex items-center justify-center gap-2 hover:bg-cyan-500/20 transition-all rounded">
                <span class="material-symbols-outlined text-sm">add</span> NOVO PROJETO
            </button>
        </div>
        <div id="project-list" class="flex-1 overflow-y-auto px-4 pb-4 space-y-2">
            <!-- Items Injetados via JS -->
            <p class="text-sm text-slate-500 text-center py-10">Carregando Banco...</p>
        </div>
    </div>

    <!-- Main Content / Form -->
    <div class="flex-1 h-full overflow-y-auto p-10 relative">
        <div class="absolute inset-0 bg-noise opacity-10 pointer-events-none"></div>
        <div class="max-w-4xl mx-auto cyber-panel p-8 rounded-xl shadow-[0_0_40px_rgba(0,40,255,0.05)] relative z-10" id="editor-wrapper" style="display: none;">
            <div class="flex justify-between items-center mb-6 border-b border-cyan-500/20 pb-4">
                <h2 class="text-2xl font-headline font-bold text-white uppercase tracking-wider" id="editor-title">Criando Projeto</h2>
                <div class="flex gap-2">
                    <button onclick="saveProject()" class="bg-cyan-500 text-black px-6 py-2 font-bold hover:shadow-[0_0_15px_rgba(0,240,255,0.4)] transition-all rounded text-sm uppercase flex items-center gap-2">
                        <span class="material-symbols-outlined text-[18px]">save</span> SALVAR
                    </button>
                    <button id="btn-delete" onclick="deleteProject()" class="bg-red-900/50 text-red-400 border border-red-500/30 px-4 py-2 font-bold hover:bg-red-500/20 transition-all rounded text-sm uppercase shadow-none hidden">
                        DELETAR
                    </button>
                </div>
            </div>

            <form id="project-form" class="space-y-6">
                <!-- Helper Hidden ID -->
                <input type="hidden" id="proj_id">
                
                <div class="grid grid-cols-2 gap-6">
                    <div class="col-span-1">
                        <label class="block text-xs uppercase tracking-widest text-cyan-500 mb-2">Título do Case</label>
                        <input type="text" id="proj_title" class="w-full input-cyber p-3 rounded" placeholder="Ex: LML STUDIO REDESIGN">
                    </div>
                    <div class="col-span-1">
                        <label class="block text-xs uppercase tracking-widest text-cyan-500 mb-2">Subtítulo (TAG)</label>
                        <input type="text" id="proj_subtitle" class="w-full input-cyber p-3 rounded" placeholder="Ex: ARQUITETURA WEB">
                    </div>
                </div>

                <div>
                    <label class="block text-xs uppercase tracking-widest text-cyan-500 mb-2">Tecnologias Usadas (Chips)</label>
                    <input type="text" id="proj_tech" class="w-full input-cyber p-3 rounded" placeholder="Ex: HTML, Tailwind, GSAP, Supabase">
                    <p class="text-[10px] text-slate-500 mt-1 uppercase">Separe os nomes por vírgula para formarem Badges.</p>
                </div>

                <div>
                    <label class="block text-xs uppercase tracking-widest text-cyan-500 mb-2">Master Description (Contexto Geral)</label>
                    <textarea id="proj_desc" rows="6" class="w-full input-cyber p-3 rounded" placeholder="Descrição completa do desafio, execução e arquitetura..."></textarea>
                </div>

                <div class="border-t border-cyan-500/20 pt-6 mt-6">
                    <h3 class="text-lg font-headline font-bold text-white uppercase tracking-wider mb-4">Galeria de Mídia</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs uppercase tracking-widest text-cyan-500 mb-1">Capa Principal (URL)</label>
                            <input type="text" id="proj_img1" class="w-full input-cyber p-2 rounded text-sm mb-2" placeholder="https://...">
                        </div>
                        <div>
                            <label class="block text-xs uppercase tracking-widest text-cyan-500 mb-1">Imagem Galeria 2 (URL)</label>
                            <input type="text" id="proj_img2" class="w-full input-cyber p-2 rounded text-sm mb-2" placeholder="https://...">
                        </div>
                        <div>
                            <label class="block text-xs uppercase tracking-widest text-cyan-500 mb-1">Imagem Galeria 3 (URL)</label>
                            <input type="text" id="proj_img3" class="w-full input-cyber p-2 rounded text-sm mb-2" placeholder="https://...">
                        </div>
                        <div>
                            <label class="block text-xs uppercase tracking-widest text-cyan-500 mb-1">Imagem Galeria 4 (URL)</label>
                            <input type="text" id="proj_img4" class="w-full input-cyber p-2 rounded text-sm mb-2" placeholder="https://...">
                        </div>
                    </div>
                </div>
            </form>
        </div>
        
        <div id="empty-state" class="flex flex-col items-center justify-center h-full opacity-50">
            <span class="material-symbols-outlined text-6xl text-cyan-500 mb-4">database</span>
            <p class="font-headline tracking-widest uppercase text-xl">Selecione ou Crie um Projeto</p>
        </div>
    </div>

<script border-0>
    // Configurações do Supabase
    const SUPABASE_URL = 'https://hrucwxjuapmtflfgmbiv.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_0Q9jLPL2aH4yMLonC7tQ2A_RruzWTVm';

    // Inicialização do Cliente
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let currentProjects = [];
    let userSession = null;

    // --- Fluxo de Autenticação ---
    
    const loginForm = document.getElementById('login-form');
    const loginOverlay = document.getElementById('login-overlay');
    const loginError = document.getElementById('login-error');

    // Monitorar estado da sessão
    _supabase.auth.onAuthStateChange((event, session) => {
        userSession = session;
        if (session) {
            loginOverlay.style.opacity = '0';
            setTimeout(() => { loginOverlay.style.display = 'none'; }, 500);
            loadProjects();
        } else {
            loginOverlay.style.display = 'flex';
            setTimeout(() => { loginOverlay.style.opacity = '1'; }, 10);
        }
    });

    // Login
    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        loginError.classList.add('hidden');
        
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;

        const { error } = await _supabase.auth.signInWithPassword({ email, password });

        if (error) {
            loginError.innerText = "Falha na Autenticação: " + error.message;
            loginError.classList.remove('hidden');
        }
    });

    // Logout
    async function handleLogout() {
        if(confirm("Deseja encerrar a sessão no Nexus?")) {
            await _supabase.auth.signOut();
        }
    }

    // --- Gerenciamento de Projetos ---

    async function loadProjects() {
        const listDiv = document.getElementById('project-list');
        try {
            const { data, error } = await _supabase
                .from('portfolio_projects')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) throw error;
            
            currentProjects = data;
            listDiv.innerHTML = data.map(p => `
                <div onclick="editProject('${p.id}')" class="p-4 bg-slate-900/50 hover:bg-cyan-900/40 border border-transparent hover:border-cyan-500/50 cursor-pointer rounded transition-all group">
                    <h4 class="text-white font-bold text-sm truncate group-hover:text-cyan-400">${p.title}</h4>
                    <span class="text-xs text-slate-500 uppercase tracking-widest">${p.subtitle || 'NO-TAG'}</span>
                </div>
            `).join('');
            
            if(data.length === 0) {
                listDiv.innerHTML = `<p class="text-sm text-slate-500 text-center py-4">Nenhum projeto encontrado.</p>`;
            }
        } catch (error) {
            console.error(error);
            listDiv.innerHTML = `<p class="text-sm text-red-500 text-center py-4">Erro de Conexão com o Nexus.</p>`;
        }
    }

    function createNew() {
        document.getElementById('empty-state').style.display = 'none';
        document.getElementById('editor-wrapper').style.display = 'block';
        document.getElementById('editor-title').innerText = 'NOVO PROJETO';
        document.getElementById('btn-delete').classList.add('hidden');
        document.getElementById('project-form').reset();
        document.getElementById('proj_id').value = '';
    }

    function editProject(id) {
        const project = currentProjects.find(p => p.id === id);
        if(!project) return;
        
        document.getElementById('empty-state').style.display = 'none';
        document.getElementById('editor-wrapper').style.display = 'block';
        document.getElementById('editor-title').innerText = 'EDITANDO: ' + project.title;
        document.getElementById('btn-delete').classList.remove('hidden');

        document.getElementById('proj_id').value = project.id;
        document.getElementById('proj_title').value = project.title || '';
        document.getElementById('proj_subtitle').value = project.subtitle || '';
        document.getElementById('proj_desc').value = project.description || '';
        document.getElementById('proj_tech').value = project.technologies ? project.technologies.join(', ') : '';

        document.getElementById('proj_img1').value = project.main_image_url || '';
        document.getElementById('proj_img2').value = project.image_2_url || '';
        document.getElementById('proj_img3').value = project.image_3_url || '';
        document.getElementById('proj_img4').value = project.image_4_url || '';
    }

    async function saveProject() {
        const id = document.getElementById('proj_id').value;
        const payload = {
            title: document.getElementById('proj_title').value,
            subtitle: document.getElementById('proj_subtitle').value,
            description: document.getElementById('proj_desc').value,
            technologies: document.getElementById('proj_tech').value.split(',').map(s => s.trim()).filter(s => s),
            main_image_url: document.getElementById('proj_img1').value,
            image_2_url: document.getElementById('proj_img2').value,
            image_3_url: document.getElementById('proj_img3').value,
            image_4_url: document.getElementById('proj_img4').value
        };

        try {
            let res;
            if(id) {
                res = await _supabase.from('portfolio_projects').update(payload).eq('id', id);
            } else {
                res = await _supabase.from('portfolio_projects').insert(payload);
            }

            if(res.error) throw res.error;
            
            alert("Sincronização com o Nexus Concluída!");
            loadProjects();
            createNew(); 
        } catch(error) {
            console.error(error);
            alert("Erro ao salvar dados: " + error.message);
        }
    }

    async function deleteProject() {
        if(!confirm("Atenção: A deleção deste asset é permanente. Continuar?")) return;
        
        const id = document.getElementById('proj_id').value;
        try {
            const { error } = await _supabase.from('portfolio_projects').delete().eq('id', id);
            if(error) throw error;
            
            loadProjects();
            document.getElementById('editor-wrapper').style.display = 'none';
            document.getElementById('empty-state').style.display = 'flex';
        } catch(e) {
            console.error(e);
            alert("Erro na deleção: " + e.message);
        }
    }
</script>
</body>
</html>
